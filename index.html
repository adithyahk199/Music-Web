<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crate - Music Collection</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= NAVBAR ================= -->

    <header>

        <nav class="navbar">

            <div class="logo">
                CRATE
            </div>

            <ul class="nav-links">
                <li><a href="#">Collection</a></li>
                <li><a href="#">Artists</a></li>
                <li><a href="#">Genres</a></li>
                <li><a href="#">Radio</a></li>
            </ul>

            <button class="btn">
                Add Record
            </button>

            <div class="menu-btn">
                ☰
            </div>

        </nav>

    </header>



    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-container">

            <!-- LEFT -->

            <div class="hero-left">

                <p class="records">
                    ▶ 2,847 RECORDS IN YOUR COLLECTION
                </p>

                <h1>

                    Every Groove

                    <span>Tells</span>

                    a Story.

                </h1>

                <p class="description">

                    Your personal vinyl archive —
                    catalogued, curated and always spinning.

                </p>

                <div class="hero-buttons">

                    <button class="play-btn">

                        ❚❚
                        Pause

                    </button>

                    <a href="#">
                        Browse Collection →
                    </a>

                </div>

            </div>


            <!-- RIGHT -->

            <div class="hero-right">

                <div class="vinyl">

                    <div class="center-circle"></div>

                </div>

            </div>

        </div>



        <!-- PLAYER -->

        <div class="music-player">

            <div class="album">

                <div class="mini-vinyl"></div>

            </div>

            <div class="song-info">

                <h3>Glass Corridor</h3>

                <p>The Analog Drift</p>

            </div>

            <div class="equalizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

            <button class="pause">

                ❚❚

            </button>

        </div>

    </section>



    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>

</body>
</html>
